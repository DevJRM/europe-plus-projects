<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
  <!-- Horizontal stripes: Red, White, Blue -->
  <rect width="900" height="200" fill="#C6373D"/>
  <rect width="900" height="200" fill="#FFFFFF" y="200"/>
  <rect width="900" height="200" fill="#003DA5" y="400"/>

  <!-- Serbian coat of arms: Crown with 4 Cyrillic S's (Cyrillic cross pattern) in upper left -->
  <g transform="translate(80, 60)">
    <!-- Crown -->
    <circle cx="50" cy="40" r="15" fill="#FFD700" stroke="#DAA520" stroke-width="1"/>
    <polygon points="50,25 55,35 60,25 55,30" fill="#FFD700" stroke="#DAA520" stroke-width="1"/>
    <polygon points="50,25 45,35 40,25 45,30" fill="#FFD700" stroke="#DAA520" stroke-width="1"/>
    <polygon points="55,22 58,32 62,22 59,27" fill="#FFD700" stroke="#DAA520" stroke-width="1"/>
    <polygon points="45,22 42,32 38,22 41,27" fill="#FFD700" stroke="#DAA520" stroke-width="1"/>

    <!-- Cyrillic C/S shapes (Serbian cross pattern - 4 C's arranged in a cross) -->
    <!-- Center C -->
    <path d="M 50 40 Q 40 40 40 50 Q 40 60 50 60 Q 55 60 58 57" fill="none" stroke="#C6373D" stroke-width="3" stroke-linecap="round"/>

    <!-- Top C -->
    <path d="M 50 20 Q 42 20 42 28 Q 42 35 50 35 Q 54 35 57 33" fill="none" stroke="#C6373D" stroke-width="2" stroke-linecap="round"/>

    <!-- Bottom C -->
    <path d="M 50 65 Q 42 65 42 73 Q 42 80 50 80 Q 54 80 57 77" fill="none" stroke="#C6373D" stroke-width="2" stroke-linecap="round"/>

    <!-- Right C -->
    <path d="M 70 50 Q 70 42 62 42 Q 55 42 55 50 Q 55 55 58 58" fill="none" stroke="#C6373D" stroke-width="2" stroke-linecap="round"/>

    <!-- Left C -->
    <path d="M 30 50 Q 30 42 38 42 Q 45 42 45 50 Q 45 55 42 58" fill="none" stroke="#C6373D" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
